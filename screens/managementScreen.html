        <!-- Match Management — independent fullscreen used at kick-off and
             mid-match (Manage button). Mounts the Match Management variant
             of the mgmt-components panel into .match-mgmt-host. The variant
             differs from the clubhouse Tactic view by composing: bench list,
             live score chip, pending-subs slot, primary action button. -->
        <div class="screen active" id="managementScreen" style="flex-direction: column; height: 100%; overflow: hidden; padding: 20px;">
            <div style="display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 15px; flex-shrink: 0;">
                <div id="managementCrest"></div>
                <h2 id="managementTitle" style="text-align: center; color: #FFD700; text-transform: uppercase; font-size: 22px; letter-spacing: 3px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); margin: 0;">⚽ MATCH MANAGEMENT ⚽</h2>
            </div>

            <div class="match-mgmt-host" style="flex: 1; min-height: 0; overflow: hidden;"></div>
        </div>
