        <!-- Clubhouse — the post-onboarding "home base" for the user's club.
             Left rail: navigation menu. Right pane: switchable views — the
             default "stadium" illustration, the league table, or the fixture
             list. Other items (Squad / Play Match) navigate to other screens. -->
        <div class="screen" id="clubhouseScreen">
            <div class="clubhouse-grid">

                <aside class="clubhouse-menu" id="chMenuDrawer">
                    <div class="ch-club-head">
                        <div class="ch-crest" id="chCrestSlot"></div>
                        <div class="ch-club-text">
                            <div class="ch-club-name" id="chClubName">Your Club</div>
                            <div class="ch-club-sub"  id="chClubSub">— · —</div>
                        </div>
                    </div>

                    <button class="ch-menu-item" data-clubhouse-action="home">
                        <span class="ch-icon">🏟️</span><span>Stadium</span>
                    </button>
                    <button class="ch-menu-item" data-clubhouse-action="squad">
                        <span class="ch-icon">👥</span><span>Squad</span>
                    </button>
                    <button class="ch-menu-item" data-clubhouse-action="tactics">
                        <span class="ch-icon">📋</span><span>Tactics &amp; XI</span>
                    </button>
                    <button class="ch-menu-item" data-clubhouse-action="league">
                        <span class="ch-icon">🏆</span><span>League Table</span>
                    </button>
                    <button class="ch-menu-item" data-clubhouse-action="fixtures">
                        <span class="ch-icon">📅</span><span>Fixtures</span>
                    </button>
                    <button class="ch-menu-item" data-clubhouse-action="play">
                        <span class="ch-icon">⚽</span><span>Play Next Match</span>
                    </button>
                    <button class="ch-menu-item" data-clubhouse-action="history">
                        <span class="ch-icon">📜</span><span>Match History</span>
                    </button>
                    <button class="ch-menu-item" data-clubhouse-action="office">
                        <span class="ch-icon">🪑</span><span>Manager's Office</span>
                    </button>

                    <!-- Back / Forward pill — pinned to the bottom of the
                         left menu. Drives the navigation stack just like
                         the previous floating-nav did. -->
                    <div class="ch-menu-nav" id="chMenuNav" aria-label="Navigation history">
                        <button id="navBackBtn" class="fn-btn" disabled aria-label="Back" title="Back">‹</button>
                        <span class="fn-label" id="navLabel">—</span>
                        <button id="navFwdBtn"  class="fn-btn" disabled aria-label="Forward" title="Forward">›</button>
                    </div>
                </aside>

                <main class="clubhouse-stage">
                    <!-- Default stadium view -->
                    <div class="ch-view ch-view-stadium active" data-view="stadium">
                        <div class="ch-stadium" id="chStadium"></div>
                        <div class="ch-banner">
                            <div class="ch-banner-tag">Home of</div>
                            <div class="ch-banner-name" id="chBannerName">Your Club</div>
                            <div class="ch-banner-sub"  id="chBannerSub">— · —</div>
                        </div>
                    </div>

                    <!-- League table view -->
                    <div class="ch-view ch-view-table" data-view="league">
                        <div class="ch-view-head">
                            <span>🏆</span>
                            <span id="chLeagueTitle">League Table</span>
                        </div>
                        <div class="ch-view-body" id="chLeagueBody">
                            <!-- Filled by _renderClubhouseLeague() -->
                        </div>
                    </div>

                    <!-- Fixtures view -->
                    <div class="ch-view ch-view-table" data-view="fixtures">
                        <div class="ch-view-head">
                            <span>📅</span>
                            <span id="chFixturesTitle">Fixtures</span>
                        </div>
                        <div class="ch-view-body" id="chFixturesBody">
                            <!-- Filled by _renderClubhouseFixtures() -->
                        </div>
                    </div>

                    <!-- Tactic view — clubhouse-embedded tactics/XI editor.
                         Mounts the Tactic variant of mgmt-components, which
                         composes: squad-depth list, next-match chip, formation
                         pitch, formation selector, tactic panel, preset slots.
                         No primary action — clubhouse menu handles nav. -->
                    <div class="ch-view ch-view-tactic" data-view="tactic">
                        <div class="ch-view-head">
                            <span>📋</span>
                            <span>Tactics &amp; XI</span>
                        </div>
                        <div class="tactic-host" style="flex: 1; min-height: 0; margin-top: 12px; overflow: hidden;"></div>
                    </div>

                    <!-- Next match preview — shown when user clicks Play Next
                         Match. Filled by _renderNextMatchView(): two crests,
                         "vs", date, venue, and a Play button that triggers
                         the fast-forward loading bar. -->
                    <div class="ch-view ch-view-next-match" data-view="next-match">
                        <div class="ch-view-head">
                            <span>⚽</span>
                            <span id="chNextMatchTitle">Next Match</span>
                        </div>
                        <div class="ch-nm-body" id="chNextMatchBody">
                            <!-- Populated by _renderNextMatchView() -->
                        </div>
                    </div>

                    <!-- Today's fixture results — landed on after a match
                         finishes + the other 4 round matches are simulated.
                         Filled by _renderTodaysFixturePanel(). -->
                    <div class="ch-view ch-view-table" data-view="today-fixture">
                        <div class="ch-view-head">
                            <span>📋</span>
                            <span id="chTodayTitle">Today's Results</span>
                        </div>
                        <div class="ch-view-body" id="chTodayBody">
                            <!-- Populated by _renderTodaysFixturePanel() -->
                        </div>
                    </div>

                    <!-- Squad view: full-width player list. Clicking a row
                         slides the detail overlay (`.ch-squad-detail`) over
                         the top of the list within the right pane. -->
                    <div class="ch-view ch-view-squad" data-view="squad">
                        <div class="ch-view-head">
                            <span>👥</span>
                            <span id="chSquadTitle">Squad</span>
                            <!-- Attributes / Performance tab switch — sits in
                                 the same header strip so the table area is the
                                 full pane below. Wired by _renderClubhouseSquad. -->
                            <div class="ch-squad-tabs" id="chSquadTabs" role="tablist">
                                <button class="ch-squad-tab active" data-squad-tab="attributes" role="tab">Attributes</button>
                                <button class="ch-squad-tab"        data-squad-tab="performance" role="tab">Performance</button>
                            </div>
                        </div>
                        <div class="ch-squad-stage">
                            <div class="ch-squad-list" id="chSquadList"><!-- player rows --></div>
                            <div class="ch-squad-detail" id="chSquadDetail" aria-hidden="true">
                                <div class="ch-squad-nav">
                                    <button class="ch-squad-navbtn" id="chSquadPrevBtn"
                                            aria-label="Previous player" title="Previous (←)">‹</button>
                                    <span class="ch-squad-navlabel" id="chSquadNavLabel">— / —</span>
                                    <button class="ch-squad-navbtn" id="chSquadNextBtn"
                                            aria-label="Next player" title="Next (→)">›</button>
                                    <button class="ch-squad-close" id="chSquadCloseBtn"
                                            aria-label="Close details" title="Close">×</button>
                                </div>
                                <div class="ch-squad-detail-inner" id="chSquadDetailInner"></div>
                            </div>
                        </div>
                    </div>
                </main>

            </div>

            <!-- Mobile-only app footer. Two halves:
                  - Left:  "Menu" pill — toggles the bottom-sheet of menu items
                  - Right: Back / forward nav pill (mirrors the desktop nav stack)
                 Hidden on desktop by CSS. -->
            <footer class="ch-mobile-footer" id="chMobileFooter">
                <button class="ch-foot-half ch-foot-menu" id="chMobileMenuBtn" type="button"
                        aria-label="Open menu" aria-controls="chMobileMenuSheet" aria-expanded="false">
                    <span class="ch-foot-icon">☰</span>
                    <span class="ch-foot-label">Menu</span>
                </button>
                <div class="ch-foot-half ch-foot-nav" id="chMobileNavPill" aria-label="Navigation history">
                    <button id="mobileNavBackBtn" class="fn-btn" type="button" disabled aria-label="Back" title="Back">‹</button>
                    <span class="fn-label" id="mobileNavLabel">—</span>
                    <button id="mobileNavFwdBtn"  class="fn-btn" type="button" disabled aria-label="Forward" title="Forward">›</button>
                </div>
            </footer>

            <!-- Mobile-only bottom sheet of menu items. Slides up from the
                 footer's left half. Items mirror the .ch-menu-item buttons in
                 the desktop rail (same data-clubhouse-action), so the same
                 click handler wires them automatically. -->
            <div class="ch-mobile-menu-backdrop" id="chMobileMenuBackdrop" aria-hidden="true"></div>
            <nav class="ch-mobile-menu-sheet" id="chMobileMenuSheet" aria-hidden="true">
                <div class="ch-mobile-menu-handle"></div>
                <button class="ch-menu-item" data-clubhouse-action="home">
                    <span class="ch-icon">🏟️</span><span>Stadium</span>
                </button>
                <button class="ch-menu-item" data-clubhouse-action="squad">
                    <span class="ch-icon">👥</span><span>Squad</span>
                </button>
                <button class="ch-menu-item" data-clubhouse-action="tactics">
                    <span class="ch-icon">📋</span><span>Tactics &amp; XI</span>
                </button>
                <button class="ch-menu-item" data-clubhouse-action="league">
                    <span class="ch-icon">🏆</span><span>League Table</span>
                </button>
                <button class="ch-menu-item" data-clubhouse-action="fixtures">
                    <span class="ch-icon">📅</span><span>Fixtures</span>
                </button>
                <button class="ch-menu-item" data-clubhouse-action="play">
                    <span class="ch-icon">⚽</span><span>Play Next Match</span>
                </button>
                <button class="ch-menu-item" data-clubhouse-action="history">
                    <span class="ch-icon">📜</span><span>Match History</span>
                </button>
                <button class="ch-menu-item" data-clubhouse-action="office">
                    <span class="ch-icon">🪑</span><span>Manager's Office</span>
                </button>
            </nav>
        </div>
