        <div class="screen active" id="managementScreen" style="flex-direction: column; height: 100%; overflow: hidden; padding: 20px;">
            <div style="display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 15px; flex-shrink: 0;">
                <div id="managementCrest"></div>
                <h2 style="text-align: center; color: #FFD700; text-transform: uppercase; font-size: 22px; letter-spacing: 3px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); margin: 0;" id="managementTitle">⚽ TEAM CONTROL ⚽</h2>
            </div>

            <!-- Mobile-only player detail panel (shown between title and squad lists) -->
            <div id="mobilePlayerDetail"></div>

            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 15px; flex: 1; overflow: hidden; min-height: 0;" id="mgmtMainGrid">
                <!-- LEFT (1/3): PLAYER LIST -->
                <div class="squad-section">
                    <div class="squad-title">👥 PLAYERS</div>
                    <div class="squad-list" id="benchList"></div>
                </div>

                <!-- RIGHT (2/3): stacked top = formation (2/3 height), bottom = settings (1/3 height) -->
                <div style="display: grid; grid-template-rows: 2fr 1fr; gap: 15px; overflow: hidden; min-height: 0;" id="mgmtRightStack">
                    <!-- TOP HALF: STARTING XI -->
                    <div class="squad-section" style="padding: 0; overflow: hidden; display: flex; flex-direction: column; position: relative;">
                        <div class="squad-title" style="border-radius: 0; flex-shrink: 0;">⚽ STARTING XI</div>
                        <div id="formationPitch" class="fm-pitch"></div>

                        <!-- Player detail overlay (covers formation pitch on click) -->
                        <div id="playerDetailOverlay" class="player-detail-overlay" style="display: none;">
                            <button class="player-detail-close-x" id="playerDetailCloseX" type="button" aria-label="Close">×</button>
                            <div id="playerDetailOverlayContent"></div>
                        </div>
                    </div>

                    <!-- BOTTOM HALF: SETTINGS -->
                    <div style="display: flex; flex-direction: column; gap: 12px; overflow-y: auto; min-height: 0; padding-right: 4px;" id="mgmtSettingsPane">
                        <!-- Formation Selector (pre-match only) -->
                        <div id="mgmtFormationSelector" style="flex-shrink: 0; display: none;">
                        <div style="color: #FFD700; font-weight: bold; font-size: 11px; text-align: center; margin-bottom: 7px; text-transform: uppercase; letter-spacing: 1px;">⚙ Formation</div>
                        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;">
                            <button class="formation-btn" data-formation="442" onclick="window.game.selectFormation(this)" style="padding: 7px 4px; font-size: 12px;">4-4-2<div class="formation-desc">Balanced</div></button>
                            <button class="formation-btn" data-formation="433" onclick="window.game.selectFormation(this)" style="padding: 7px 4px; font-size: 12px;">4-3-3<div class="formation-desc">Offensive</div></button>
                            <button class="formation-btn" data-formation="451" onclick="window.game.selectFormation(this)" style="padding: 7px 4px; font-size: 12px;">4-5-1<div class="formation-desc">Midfield</div></button>
                            <button class="formation-btn" data-formation="532" onclick="window.game.selectFormation(this)" style="padding: 7px 4px; font-size: 12px;">5-3-2<div class="formation-desc">Defensive</div></button>
                            <button class="formation-btn" data-formation="541" onclick="window.game.selectFormation(this)" style="padding: 7px 4px; font-size: 12px;">5-4-1<div class="formation-desc">Ultra Def</div></button>
                            <button class="formation-btn" data-formation="352" onclick="window.game.selectFormation(this)" style="padding: 7px 4px; font-size: 12px;">3-5-2<div class="formation-desc">Mid Power</div></button>
                            <button class="formation-btn" data-formation="343" onclick="window.game.selectFormation(this)" style="padding: 7px 4px; font-size: 12px;">3-4-3<div class="formation-desc">Attack</div></button>
                        </div>
                    </div>

                    <!-- Tactics Panel (CM 03/04 style) -->
                    <div class="instruction-panel" id="instructionPanel" style="flex-shrink: 0;">
                        <div class="instruction-title">⚔ Tactics</div>

                        <div class="tactic-row">
                            <span class="tactic-label">Mentality</span>
                            <div class="tactic-options">
                                <button class="tactic-btn" data-tactic="mentality" data-value="ultra-def">U.Def</button>
                                <button class="tactic-btn" data-tactic="mentality" data-value="defensive">Def</button>
                                <button class="tactic-btn active" data-tactic="mentality" data-value="normal">Normal</button>
                                <button class="tactic-btn" data-tactic="mentality" data-value="attacking">Attack</button>
                                <button class="tactic-btn" data-tactic="mentality" data-value="gung-ho">GungHo</button>
                            </div>
                        </div>

                        <div class="tactic-row">
                            <span class="tactic-label">Pressing</span>
                            <div class="tactic-options">
                                <button class="tactic-btn" data-tactic="closingDown" data-value="always">Always</button>
                                <button class="tactic-btn active" data-tactic="closingDown" data-value="standard">Standard</button>
                                <button class="tactic-btn" data-tactic="closingDown" data-value="stand-off">StandOff</button>
                                <button class="tactic-btn" data-tactic="closingDown" data-value="own-half">Own Half</button>
                            </div>
                        </div>

                        <div class="tactic-row">
                            <span class="tactic-label">Tackling</span>
                            <div class="tactic-options">
                                <button class="tactic-btn" data-tactic="tackling" data-value="hard">Hard</button>
                                <button class="tactic-btn active" data-tactic="tackling" data-value="normal">Normal</button>
                                <button class="tactic-btn" data-tactic="tackling" data-value="easy">Easy</button>
                            </div>
                        </div>

                        <div class="tactic-row">
                            <span class="tactic-label">Passing</span>
                            <div class="tactic-options">
                                <button class="tactic-btn" data-tactic="passing" data-value="direct">Direct</button>
                                <button class="tactic-btn active" data-tactic="passing" data-value="mixed">Mixed</button>
                                <button class="tactic-btn" data-tactic="passing" data-value="short">Short</button>
                            </div>
                        </div>

                        <div class="tactic-row">
                            <span class="tactic-label">Marking</span>
                            <div class="tactic-options">
                                <button class="tactic-btn active" data-tactic="marking" data-value="zonal">Zonal</button>
                                <button class="tactic-btn" data-tactic="marking" data-value="man">Man</button>
                            </div>
                        </div>

                        <div class="tactic-row">
                            <span class="tactic-label">Time Wasting</span>
                            <div class="tactic-options">
                                <button class="tactic-btn" data-tactic="timeWasting" data-value="never">Never</button>
                                <button class="tactic-btn active" data-tactic="timeWasting" data-value="mixed">Mixed</button>
                                <button class="tactic-btn" data-tactic="timeWasting" data-value="often">Often</button>
                            </div>
                        </div>

                        <div class="tactic-row">
                            <span class="tactic-label">Counter Attack</span>
                            <div class="tactic-options">
                                <button class="tactic-btn active" data-tactic="counterAttack" data-value="no">No</button>
                                <button class="tactic-btn" data-tactic="counterAttack" data-value="yes">Yes</button>
                            </div>
                        </div>
                    </div>

                    <!-- Close Button (in-match only) — Confirm Sub & info bar removed; subs auto-apply on selection -->
                    <div id="subControls" style="flex-shrink: 0; display: none;">
                        <button class="btn-secondary" id="closeManageBtn" style="width: 100%;">Close</button>
                    </div>

                        <!-- Start Match Button (pre-match only) -->
                        <div id="startMatchSection" style="flex-shrink: 0; display: none;">
                            <button class="btn-primary" id="mgmtStartBtn" onclick="window.game.startMatch()" style="width: 100%; padding: 14px; font-size: 15px; letter-spacing: 2px; text-transform: uppercase;">▶ Start Match</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
