                <!-- Right Sidebar: Events, Formation, Stats -->
                <div class="match-sidebar">
                    <div class="event-log-filter">
                        <button class="event-log-filter-btn active" data-filter="all" onclick="window.game.setEventLogFilter('all')">All</button>
                        <button class="event-log-filter-btn" data-filter="important" onclick="window.game.setEventLogFilter('important')">Important</button>
                        <button class="event-log-filter-btn" data-filter="critical" onclick="window.game.setEventLogFilter('critical')">Critical</button>
                    </div>
                    <div class="events-log" id="eventsLog">
                        <div class="event pass event-pri-low">⚪ Match started! Possession: 50-50</div>
                    </div>

                    <div class="stats" id="stats">
                        <div class="stat">
                            <div class="stat-label">Shots on Target</div>
                            <div class="stat-value"><span id="playerShots">0</span>-<span id="cpuShots">0</span></div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">Possession</div>
                            <div class="stat-value"><span id="playerPoss">50</span>%-<span id="cpuPoss">50</span>%</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">Tackles</div>
                            <div class="stat-value"><span id="playerTackles">0</span>-<span id="cpuTackles">0</span></div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">Passes</div>
                            <div class="stat-value"><span id="playerPasses">0</span>-<span id="cpuPasses">0</span></div>
                        </div>
                    </div>
                </div>

            <!-- Match view actions. Manage Team is the only button kept in
                 the match view itself — every other control (Pause / Speed /
                 Mute / Debug) lives in the top hamburger dropdown so it's
                 accessible from anywhere without crowding the match HUD. -->
            <div class="buttons">
                <button class="btn-secondary" id="manageBtn" style="display: none;">Manage Team</button>
            </div>
